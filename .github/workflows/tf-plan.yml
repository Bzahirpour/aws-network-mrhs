name: Terraform Plan

on:
  workflow_call:
    inputs:
      tf_version:
        description: Terraform version to use
        type: string
        default: '1.14.8'
      aws_region:
        description: AWS region
        type: string
        default: 'us-east-1'
      environment:
        description: Environment label shown in the PR comment (dev, prod)
        type: string
        required: true
      working_directory:
        description: Path to the Terraform environment workspace
        type: string
        required: true
    secrets:
      aws_role_arn:
        description: IAM role ARN assumed via OIDC
        required: true
      tf_vars:
        description: |
          JSON object of Terraform variable values.
          e.g. {"alarm_email":"you@example.com","other_var":"value"}
          Each key becomes TF_VAR_<key> in the environment.
        required: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan (${{ inputs.environment }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Set Terraform variables
        if: ${{ secrets.tf_vars != '' }}
        env:
          TF_VARS_JSON: ${{ secrets.tf_vars }}
        run: |
          echo "$TF_VARS_JSON" | \
            jq -r 'to_entries[] | "TF_VAR_\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init

      - name: Validate
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate

      - name: Plan
        id: plan
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform plan -no-color -out=tfplan -lock-timeout=120s
          delimiter="$(dd if=/dev/urandom bs=15 count=1 status=none | base64)"
          {
            echo "PLAN<<${delimiter}"
            terraform show -no-color tfplan
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Comment plan on PR
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.PLAN }}
          ENVIRONMENT: ${{ inputs.environment }}
        with:
          script: |
            const env = process.env.ENVIRONMENT;
            const plan = process.env.PLAN || '(no plan output)';
            const truncated = plan.length > 60000
              ? plan.slice(0, 60000) + '\n\n... (truncated; see workflow logs for full plan)'
              : plan;
            const body = `### Terraform plan: \`${env}\`\n\n<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n\n</details>`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
