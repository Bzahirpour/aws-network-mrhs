# .github/workflows/apply.yml
name: Apply

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/apply.yml'

concurrency:
  group: apply-main
  cancel-in-progress: false

env:
  TF_VERSION: "1.14.8"
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::453624448159:role/mrhs-github-actions
  TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

permissions:
  contents: read
  id-token: write

jobs:
  # ── dev ───────────────────────────────────────────────────────────────────
  plan-dev:
    name: Plan dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5  # v6.1.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create plugin cache dir
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.terraform.d/plugin-cache
          key: tf-providers-dev-${{ hashFiles('infra/envs/dev/primary/.terraform.lock.hcl') }}
          restore-keys: tf-providers-dev-

      - name: terraform init
        working-directory: infra/envs/dev/primary
        run: terraform init -lock-timeout=120s

      - name: terraform validate
        working-directory: infra/envs/dev/primary
        run: terraform validate

      - name: terraform plan
        working-directory: infra/envs/dev/primary
        run: terraform plan -no-color -out=tfplan -lock-timeout=120s

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: apply-tfplan-dev
          path: infra/envs/dev/primary/tfplan

  apply-dev:
    name: Apply dev
    runs-on: ubuntu-latest
    needs: plan-dev
    environment: dev
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5  # v6.1.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create plugin cache dir
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.terraform.d/plugin-cache
          key: tf-providers-dev-${{ hashFiles('infra/envs/dev/primary/.terraform.lock.hcl') }}
          restore-keys: tf-providers-dev-

      - name: Download plan artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: apply-tfplan-dev
          path: infra/envs/dev/primary/

      - name: terraform init (re-init for providers)
        working-directory: infra/envs/dev/primary
        run: terraform init -lock-timeout=120s

      - name: terraform apply
        working-directory: infra/envs/dev/primary
        run: terraform apply -auto-approve tfplan

  # ── prod ──────────────────────────────────────────────────────────────────
  plan-prod:
    name: Plan prod
    runs-on: ubuntu-latest
    needs: apply-dev
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5  # v6.1.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create plugin cache dir
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.terraform.d/plugin-cache
          key: tf-providers-prod-${{ hashFiles('infra/envs/prod/primary/.terraform.lock.hcl') }}
          restore-keys: tf-providers-prod-

      - name: terraform init
        working-directory: infra/envs/prod/primary
        run: terraform init -lock-timeout=120s

      - name: terraform validate
        working-directory: infra/envs/prod/primary
        run: terraform validate

      - name: terraform plan
        working-directory: infra/envs/prod/primary
        run: terraform plan -no-color -out=tfplan -lock-timeout=120s

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: apply-tfplan-prod
          path: infra/envs/prod/primary/tfplan

  apply-prod:
    name: Apply prod
    runs-on: ubuntu-latest
    needs: plan-prod
    environment: prod
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5  # v6.1.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create plugin cache dir
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.terraform.d/plugin-cache
          key: tf-providers-prod-${{ hashFiles('infra/envs/prod/primary/.terraform.lock.hcl') }}
          restore-keys: tf-providers-prod-

      - name: Download plan artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: apply-tfplan-prod
          path: infra/envs/prod/primary/

      - name: terraform init (re-init for providers)
        working-directory: infra/envs/prod/primary
        run: terraform init -lock-timeout=120s

      - name: terraform apply
        working-directory: infra/envs/prod/primary
        run: terraform apply -auto-approve tfplan
