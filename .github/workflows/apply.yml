# .github/workflows/apply.yml
name: Apply

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/apply.yml'

concurrency:
  group: apply-main
  cancel-in-progress: false

env:
  TF_VERSION: "1.14.8"
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::453624448159:role/mrhs-github-actions
  TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

permissions:
  contents: read
  id-token: write

jobs:
  # ── dev ───────────────────────────────────────────────────────────────────
  plan-dev:
    name: Plan dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create plugin cache dir
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.terraform.d/plugin-cache
          key: tf-providers-dev-${{ hashFiles('infra/envs/dev/primary/.terraform.lock.hcl') }}
          restore-keys: tf-providers-dev-

      - name: terraform init
        working-directory: infra/envs/dev/primary
        run: terraform init -lock-timeout=120s

      - name: terraform validate
        working-directory: infra/envs/dev/primary
        run: terraform validate

      - name: terraform plan
        working-directory: infra/envs/dev/primary
        run: terraform plan -no-color -out=tfplan -lock-timeout=120s

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: apply-tfplan-dev
          path: infra/envs/dev/primary/tfplan

  apply-dev:
    name: Apply dev
    runs-on: ubuntu-latest
    needs: plan-dev
    environment: dev
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create plugin cache dir
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.terraform.d/plugin-cache
          key: tf-providers-dev-${{ hashFiles('infra/envs/dev/primary/.terraform.lock.hcl') }}
          restore-keys: tf-providers-dev-

      - name: Download plan artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          name: apply-tfplan-dev
          path: infra/envs/dev/primary/

      - name: terraform init (re-init for providers)
        working-directory: infra/envs/dev/primary
        run: terraform init -lock-timeout=120s

      - name: terraform apply
        working-directory: infra/envs/dev/primary
        run: terraform apply -auto-approve tfplan

  # ── prod ──────────────────────────────────────────────────────────────────
  plan-prod:
    name: Plan prod
    runs-on: ubuntu-latest
    needs: apply-dev
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create plugin cache dir
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.terraform.d/plugin-cache
          key: tf-providers-prod-${{ hashFiles('infra/envs/prod/primary/.terraform.lock.hcl') }}
          restore-keys: tf-providers-prod-

      - name: terraform init
        working-directory: infra/envs/prod/primary
        run: terraform init -lock-timeout=120s

      - name: terraform validate
        working-directory: infra/envs/prod/primary
        run: terraform validate

      - name: terraform plan
        working-directory: infra/envs/prod/primary
        run: terraform plan -no-color -out=tfplan -lock-timeout=120s

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: apply-tfplan-prod
          path: infra/envs/prod/primary/tfplan

  apply-prod:
    name: Apply prod
    runs-on: ubuntu-latest
    needs: plan-prod
    environment: prod
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create plugin cache dir
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.terraform.d/plugin-cache
          key: tf-providers-prod-${{ hashFiles('infra/envs/prod/primary/.terraform.lock.hcl') }}
          restore-keys: tf-providers-prod-

      - name: Download plan artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          name: apply-tfplan-prod
          path: infra/envs/prod/primary/

      - name: terraform init (re-init for providers)
        working-directory: infra/envs/prod/primary
        run: terraform init -lock-timeout=120s

      - name: terraform apply
        working-directory: infra/envs/prod/primary
        run: terraform apply -auto-approve tfplan
